# ==========================================================================
# ECG1.2 — конфигурация гибридного пайплайна дигитизации ЭКГ
# Learning/demo-инструмент. НЕ медицинское изделие.
# ==========================================================================

project:
  name: ECG1.2
  # Куда складывать артефакты каждого запуска (gitignored).
  work_dir: output/runs

# Интерпретаторы Python. Внешние модели подключаются как ИЗОЛИРОВАННЫЕ
# подпроцессы, каждый со своим venv (заполняется в соответствующих фазах).
interpreters:
  core: .venv/bin/python                          # оркестратор + preprocess (numpy/cv2/yaml/matplotlib/wfdb)
  segment_calibrate: /opt/anaconda3/envs/ecgdig/bin/python   # Фаза 1: ядро felixkrones (py3.11+torch+nnU-Net)
  # reconstruct:       external/ecgtizer/.venv/bin/python     # Фаза 4

# Стадии выполняются в этом порядке. enabled: false -> стадия пропускается
# (мягкая деградация, вход прокидывается дальше без изменений).
# module: имя пакета в src/, экспортирующего run(input_path, config) -> output_path
stages:
  - name: preprocess
    module: preprocess
    enabled: true
    params:
      target_width: 2200    # апскейл под разрешение, на котором обучен nnU-Net
      perspective: true     # детекция 4 углов листа + warpPerspective

  # segment запускается ДО layout: felixkrones (nnU-Net) сегментирует всю
  # картинку и отдаёт СЫРУЮ маску. Раскладку отведений мы определяем сами по
  # маске (метки самого nnU-Net на реальных фото ненадёжны — путает отведения).
  - name: segment
    module: segment
    enabled: true
    params:
      repo_dir: external/ECG-Digitiser
      model_path: external/ECG-Digitiser/models/M3   # веса M3 (fold_all), симлинк на реальные
      reuse_cache: true                              # nnU-Net ~8мин/картинка на CPU — кэшируем

  - name: layout
    module: layout
    enabled: true
    params:
      # "auto" — определить раскладку по числу строк; или имя из
      # configs/lead_layouts.yml (3x4_1R, 6x2_1R, 12x1).
      template: "auto"

  - name: calibrate
    module: calibrate
    enabled: true
    params: {}

  - name: vectorize
    module: vectorize
    enabled: true
    params:
      clip_mV: 3.0     # клип выбросов от разрывов маски

  - name: reconstruct
    module: reconstruct
    enabled: true
    params: {}

  - name: output
    module: output
    enabled: true
    params: {}
