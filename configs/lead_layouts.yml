# ==========================================================================
# Шаблоны раскладок отведений ЭКГ.
# Схема повторяет Ahus-AIM/Open-ECG-Digitizer (src/config/lead_layouts_*.yml):
#   grid — список СТРОК; каждая строка — список отведений по колонкам.
#   Строка, где все отведения одинаковы (напр. [II, II, II, II]) — это
#   ритм-строка на всю ширину (полные 10 с).
# Длительность клетки блока = paper_seconds / cols; ритм-строка = paper_seconds.
# ==========================================================================

paper_seconds: 10          # длина записи на листе

layouts:
  # Стандарт: 3 ряда × 4 отведения (по 2.5с) + ритм-строка II (10с).
  "3x4_1R":
    description: "3×4 + ритм II (стандарт PhysioNet 2024)"
    cols: 4
    grid:
      - ["I",   "aVR", "V1", "V4"]
      - ["II",  "aVL", "V2", "V5"]
      - ["III", "aVF", "V3", "V6"]
      - ["II",  "II",  "II", "II"]

  # 6 рядов × 2 отведения (по 5с) + ритм-строка II — так генерирует
  # ecg-image-generator при num_columns=2 (порядок отведений именно такой).
  "6x2_1R":
    description: "6×2 + ритм II"
    cols: 2
    grid:
      - ["V1",  "V4"]
      - ["I",   "aVR"]
      - ["V2",  "V5"]
      - ["II",  "aVL"]
      - ["V3",  "V6"]
      - ["III", "aVF"]
      - ["II",  "II"]

  # 12 рядов × 1 (каждое отведение на всю ширину, 10с). Ритма нет.
  "12x1":
    description: "12×1 (каждое отведение 10с)"
    cols: 1
    grid:
      - ["I"]
      - ["II"]
      - ["III"]
      - ["aVR"]
      - ["aVL"]
      - ["aVF"]
      - ["V1"]
      - ["V2"]
      - ["V3"]
      - ["V4"]
      - ["V5"]
      - ["V6"]
